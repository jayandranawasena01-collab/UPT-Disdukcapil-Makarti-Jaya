<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UPT Disdukcapil Makarti Jaya</title>

    <!-- Icon dan PWA -->
    <!-- PERBAIKAN: Menggunakan link gambar langsung (Direct Link) dari Google Drive -->
    <link rel="icon" href="[https://drive.google.com/uc?export=view&id=19ZupZLIB549SJYxDPVeDw2FkZ7d4KHsM](https://drive.google.com/uc?export=view&id=19ZupZLIB549SJYxDPVeDw2FkZ7d4KHsM)" />
    <link rel="apple-touch-icon" href="[https://drive.google.com/uc?export=view&id=19ZupZLIB549SJYxDPVeDw2FkZ7d4KHsM](https://drive.google.com/uc?export=view&id=19ZupZLIB549SJYxDPVeDw2FkZ7d4KHsM)" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1976d2">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #eee;
            overflow: hidden;
        }

        .iframe-container {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe
            id="app"
            src="[https://script.google.com/macros/s/AKfycbzaA0aHneHa_vjj3Rmv6aWmNLw3Ab8KBI3fDaQdfhCmkQdBgLIQCBPBmQovAu1Z036q/exec](https://script.google.com/macros/s/AKfycbzaA0aHneHa_vjj3Rmv6aWmNLw3Ab8KBI3fDaQdfhCmkQdBgLIQCBPBmQovAu1Z036q/exec)"
            scrolling="yes"
            allowfullscreen="true"
            webkitallowfullscreen="true"
            mozallowfullscreen="true"
            allow="fullscreen; camera; microphone; display-capture; geolocation;">
        </iframe>
    </div>

    <!-- TAMBAHAN: Script untuk mendaftarkan Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => console.log('Service worker registered.', reg))
                    .catch((err) => console.log('Service worker not registered.', err));
            });
        }
    </script>
</body>
</html>
