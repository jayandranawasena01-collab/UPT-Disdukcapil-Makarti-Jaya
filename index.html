<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UPT Disdukcapil Makarti Jaya</title>

    <!-- Icon dan PWA -->
    <!-- PERBAIKAN: Format link telah dibersihkan dari tanda kurung siku [] -->
    <link rel="icon" href="icon-192.png.png" />
    <link rel="apple-touch-icon" href="icon-192.png.png" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1976d2">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #eee;
            overflow: hidden;
        }

        .iframe-container {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <!-- PERBAIKAN: Link src iframe sudah menggunakan URL murni -->
        <iframe
            id="app"
            src="https://script.google.com/macros/s/AKfycbyTcAy4fN21h4rAkcbswfJInpTSeiMzLm9fOO21bj_-B86W_0ZG4_TFlBf2V7wRm9E/exec"
            scrolling="yes"
            allowfullscreen="true"
            webkitallowfullscreen="true"
            mozallowfullscreen="true"
            allow="fullscreen; camera; microphone; display-capture; geolocation;">
        </iframe>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => console.log('Service worker registered.', reg))
                    .catch((err) => console.log('Service worker not registered.', err));
            });
        }
    </script>
</body>
</html>
